<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glaguessr</title>
    <link rel="icon" href="Img/Dima.png">
    <link rel="stylesheet" href="glaguessr.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
    <div class="background">
        <div class="main">
            <div class="chest-map">
                <img src="" alt="Map Image" class="map-img" />
                <img src="Img/closeButton2.png" alt="Close" class="map-close-bt" />
                <div class="map-options">
                    <div class="map-updown map-up">
                        <span class="material-symbols-outlined">keyboard_arrow_up</span>
                    </div>
                    <div class="map-updown map-down">
                        <span class="material-symbols-outlined">keyboard_arrow_down</span>
                    </div>
                </div>
                <div class="map-coordinates"></div>
            </div>
            <div class="rot-bt">
                <span class="material-symbols-outlined">
                    arrow_back
                </span>
            </div>
            <div class="container">
            </div>
            <div class="container">
                <div class="maps-container">

                </div>
            </div>
        </div>
    </div>
    <div class="assinatura">
        <p>Criado por Lionheart</p>
    </div>
</body>
<script src="constants.js"></script>
<script src="glaguessr.js"></script>
<style>
    .material-symbols-outlined {
        font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24;
        color: white;
    }
</style>

</html>
